---
layout: default
---
<article class="section">
  <div class="wrap measure">
    <p class="eyebrow">{{ page.kind | default: "Project" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}<p style="font-size: var(--t-md); margin-top: var(--sp-4);">{{ page.summary }}</p>{% endif %}

    {% if page.repo or page.demo %}
    <div style="display:flex; gap: var(--sp-3); margin-top: var(--sp-6);">
      {% if page.demo %}<a class="btn btn--signal" href="{{ page.demo | relative_url }}">Open demo</a>{% endif %}
      {% if page.repo %}<a class="btn btn--ghost" href="{{ page.repo }}" target="_blank" rel="noopener">View repo ↗</a>{% endif %}
    </div>
    {% endif %}

    <div style="margin-top: var(--sp-12);">
      {{ content }}
    </div>
  </div>
</article>
